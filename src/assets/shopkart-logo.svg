<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1d4ed8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon Background -->
  <rect x="4" y="4" width="82" height="82" rx="20" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect x="4" y="4" width="82" height="41" rx="20" fill="url(#shineGrad)"/>

  <!-- Shopping Bag Shape -->
  <rect x="22" y="38" width="46" height="34" rx="6" fill="white" opacity="0.95"/>
  <!-- Bag handle left -->
  <path d="M31 38 Q31 24 45 24 Q59 24 59 38" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.95"/>
  <!-- Bag shine line -->
  <line x1="30" y1="50" x2="30" y2="62" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Bag label -->
  <rect x="30" y="52" width="30" height="12" rx="3" fill="#2563eb" opacity="0.15"/>
  <!-- S letter on bag -->
  <text x="45" y="62" font-family="Arial Black" font-weight="900" font-size="11" fill="#1d4ed8" text-anchor="middle">SK</text>

  <!-- Spark / star top right of icon -->
  <circle cx="76" cy="16" r="4" fill="#fbbf24"/>
  <line x1="76" y1="10" x2="76" y2="22" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="16" x2="82" y2="16" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Brand Text: Shop -->
  <text x="102" y="55" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#ffffff">Shop</text>
  <!-- Brand Text: Kart (blue) -->
  <text x="214" y="55" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#2563eb">Kart</text>

  <!-- Underline accent -->
  <rect x="102" y="62" width="60" height="3" rx="2" fill="#ffffff" opacity="0.4"/>
  <rect x="214" y="62" width="60" height="3" rx="2" fill="#2563eb" opacity="0.4"/>

  <!-- Tagline -->
  <text x="102" y="82" font-family="Arial" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="3">SHOP SMART. SHOP FAST.</text>
</svg>
